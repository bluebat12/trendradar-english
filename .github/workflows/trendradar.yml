name: TrendRadar Intelligence Scout

on:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间 09:00（UTC 01:00）
  workflow_dispatch:

jobs:
  run-scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests feedparser

      - name: Run TrendRadar
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          BARK_KEY:         ${{ secrets.BARK_KEY }}
          BARK_SERVER:      ${{ secrets.BARK_SERVER }}
          NOTION_TOKEN:     ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID:      ${{ secrets.DATABASE_ID }}
        run: python main.py

      - name: Commit sent records
        if: always()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add sent_news_hashes.json
          git diff --cached --quiet || git commit -m "📝 Update sent records [skip ci]"
          git push
