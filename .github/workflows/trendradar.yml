name: Global English Intelligence Scout

on:
  schedule:
    - cron: '30 0 * * *'  # 北京时间 08:30 运行 (UTC 00:30)
  workflow_dispatch:

env:
  # 消除 Node.js 20 弃用警告，提前启用 Node.js 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scout:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: pip install requests feedparser google-generativeai
          
      - name: 执行 AI 情报归纳
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: python main.py
