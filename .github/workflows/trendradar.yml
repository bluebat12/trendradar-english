name: Global Intelligence Scout (Firebase Edition)

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch:

jobs:
  run-scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests feedparser firebase-admin

      - name: Run Scanner
        env:
          # Firebase 配置 (從 GitHub Secrets 讀取)
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          
          # Gemini 配置
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          
          # 推送配置
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: python main.py
