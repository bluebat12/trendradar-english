name: TrendRadar Intelligence Scout

on:
  schedule:
    - cron: '*/30 * * * *' # 每30分鐘自動運行
  workflow_dispatch: # 支持手動運行

jobs:
  run-scout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests feedparser firebase-admin

      - name: Run TrendRadar
        env:
          # Firebase
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
          
          # Gemini (建議至少填寫兩個，增加容錯)
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          
          # Push
          BARK_KEY: ${{ secrets.BARK_KEY }}
          BARK_SERVER: ${{ secrets.BARK_SERVER }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: python main.py
